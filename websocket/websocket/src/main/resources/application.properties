spring.application.name=urlShortner
# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://smartpos.cv4w86g0qd1s.ap-southeast-2.rds.amazonaws.com:5432/personalproject?currentSchema=funnyproj
spring.datasource.username=postgres
spring.datasource.password=smartpos123

# Connection Pool Settings (HikariCP is default in Spring Boot)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10

# JPA (Hibernate) Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true  

server.port=8082

spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
spring.jpa.open-in-view=false
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n
logging.level.root=INFO

